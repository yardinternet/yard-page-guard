pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: '*.{js,ts,jsx,tsx,json,css,scss,md,yml,yaml,html,blade.php}'
      exclude:
        - 'build/**'
      run: npx prettier --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob: 'resources/**/*.{js,ts,jsx,tsx}'
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    - name: pint
      glob: '*.php'
      exclude: '*.blade.php'
      run: composer format
      stage_fixed: true
